<!doctype html>
<html lang="en" class="dark">

    <meta charset="UTF-8" />

    <meta name="author" content="Rankistan Community" />
    <meta name="theme-color" content="#121212" />
    
    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rankistan.com/" />
    <meta property="og:title" content="Rankistan | The Pakistani Developer Leaderboard" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Rankistan",
      "url": "https://rankistan.com/",
      "description": "The ultimate leaderboard and directory for discovering top Pakistani developers.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://rankistan.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
